<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공학 포지션 진단</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #4f46e5;
      --primary-dark:  #3730a3;
      --primary-light: #6366f1;
      --primary-bg:    #eef2ff;
      --bg:            #f1f5f9;
      --card:          #ffffff;
      --text:          #1e293b;
      --text-muted:    #64748b;
      --border:        #e2e8f0;
      --radius:        14px;
      --shadow:        0 4px 32px rgba(0,0,0,0.08);
      --c-maker:       #f59e0b;
      --c-artist:      #8b5cf6;
      --c-director:    #10b981;
      /* Safe area insets (iPhone notch / home bar) */
      --safe-t: env(safe-area-inset-top,    0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-l: env(safe-area-inset-left,   0px);
      --safe-r: env(safe-area-inset-right,  0px);
    }

    /* ── Base ── */
    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR',
                   'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      /* flex-start prevents overflow-clip when content > viewport height */
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      /* Safe area + comfortable padding */
      padding:
        calc(20px + var(--safe-t))
        calc(20px + var(--safe-r))
        calc(20px + var(--safe-b))
        calc(20px + var(--safe-l));
      -webkit-tap-highlight-color: transparent;
    }

    /* Center vertically only when viewport is tall enough */
    @media (min-height: 700px) {
      body { align-items: center; }
    }

    #app { width: 100%; max-width: 620px; }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 32px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card.animate { animation: fadeUp 0.28s ease; }

    /* ── Intro ── */
    .intro-card { text-align: center; }
    .intro-icon  { font-size: 64px; margin-bottom: 20px; display: block; }
    .intro-title { font-size: 28px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.5px; }
    .intro-sub   { font-size: 15px; color: var(--text-muted); line-height: 1.7; margin-bottom: 28px; }

    .pos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }
    .pos-chip {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .pos-chip span.ico { font-size: 26px; }

    /* ── Progress ── */
    .progress-wrap { margin-bottom: 20px; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .progress-track {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      transition: width 0.35s ease;
    }

    /* ── Question card ── */
    .q-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .q-text {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.55;
      margin-bottom: 26px;
      word-break: keep-all;
    }

    /* ── Options ── */
    .options { display: flex; flex-direction: column; gap: 10px; }

    .opt-btn {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      width: 100%;
      min-height: 52px;
      padding: 14px 16px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      transition: border-color 0.14s, background 0.14s;
      /* Remove 300 ms tap delay & default highlight */
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      word-break: keep-all;
    }
    /* Touch active feedback */
    .opt-btn:active {
      background: var(--primary-bg);
      border-color: var(--primary-light);
    }
    .opt-btn.selected {
      border-color: var(--primary);
      background: var(--primary-bg);
    }

    /* Hover only on true pointer devices — prevents stuck hover on iOS */
    @media (hover: hover) and (pointer: fine) {
      .opt-btn:hover {
        border-color: var(--primary-light);
        background: #f5f3ff;
      }
      .opt-btn:active { transform: scale(0.99); }
    }

    .opt-circle {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      transition: background 0.14s, color 0.14s;
    }
    .opt-btn.selected .opt-circle {
      background: var(--primary);
      color: #fff;
    }
    .opt-text { flex: 1; padding-top: 3px; }

    /* ── Nav ── */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      gap: 10px;
    }

    .btn {
      padding: 13px 26px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: background 0.14s, opacity 0.14s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      min-height: 48px;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      flex: 1;
    }
    .btn-primary:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 2px solid var(--border);
      padding: 12px 18px;
      font-size: 14px;
    }
    .btn-ghost.invisible { visibility: hidden; pointer-events: none; }

    @media (hover: hover) and (pointer: fine) {
      .btn:active { transform: scale(0.98); }
      .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
      .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
    }

    /* ── Result ── */
    .result-card { text-align: center; }

    .result-badge {
      display: inline-block;
      background: var(--primary-bg);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 20px;
      margin-bottom: 18px;
    }

    .result-icon  { font-size: 72px; margin-bottom: 14px; display: block; }
    .result-title { font-size: 30px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
    .result-desc  { font-size: 15px; color: var(--text-muted); line-height: 1.75;
                    margin-bottom: 32px; word-break: keep-all; }

    /* ── Score bars ── */
    .score-bars { margin-bottom: 32px; text-align: left; }
    .score-title { font-size: 13px; font-weight: 700; color: var(--text-muted);
                   margin-bottom: 14px; letter-spacing: 0.04em; }

    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .bar-lbl {
      flex-shrink: 0;
      width: 90px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bar-track { flex: 1; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
    .bar-fill {
      height: 100%;
      border-radius: 5px;
      width: 0%;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .bar-fill.maker    { background: var(--c-maker); }
    .bar-fill.artist   { background: var(--c-artist); }
    .bar-fill.director { background: var(--c-director); }

    /* ── Full-width btn ── */
    .btn-full { width: 100%; padding: 15px; font-size: 16px; }

    /* ── Mobile ── */
    @media (max-width: 540px) {
      body {
        /* Tighter side padding; retain safe area */
        padding:
          calc(16px + var(--safe-t))
          calc(12px + var(--safe-r))
          calc(12px + var(--safe-b))
          calc(12px + var(--safe-l));
      }

      .card { padding: 22px 16px; }
      .intro-icon  { font-size: 52px; margin-bottom: 16px; }
      .intro-title { font-size: 22px; }
      .intro-sub   { font-size: 14px; }
      /* Stack position chips vertically */
      .pos-grid { grid-template-columns: 1fr; gap: 8px; margin-bottom: 22px; }
      .pos-chip { flex-direction: row; justify-content: center; padding: 12px 16px; }

      /* Slightly thicker progress bar for easier reading */
      .progress-track { height: 8px; }
      .progress-meta  { font-size: 12px; }

      .q-text   { font-size: 16px; margin-bottom: 18px; }
      .options  { gap: 8px; }
      .opt-btn  {
        font-size: 14px;
        padding: 13px 12px;
        min-height: 54px;  /* Comfortable thumb target */
        gap: 10px;
      }
      .opt-circle { width: 26px; height: 26px; font-size: 11px; }

      /* Sticky nav: stays visible as card scrolls */
      .nav {
        position: sticky;
        bottom: 0;
        /* Fade from transparent so it doesn't hard-clip content */
        background: linear-gradient(to bottom,
          rgba(241,245,249,0) 0%,
          var(--bg) 28%);
        padding-top: 14px;
        padding-bottom: max(12px, var(--safe-b));
        /* Bleed to screen edges for full-width gradient */
        margin-left:  calc(-12px - var(--safe-l));
        margin-right: calc(-12px - var(--safe-r));
        padding-left:  calc(12px + var(--safe-l));
        padding-right: calc(12px + var(--safe-r));
        z-index: 20;
      }

      .btn       { min-height: 50px; font-size: 15px; }
      .btn-ghost { padding: 12px 14px; font-size: 14px; }

      .result-icon  { font-size: 60px; }
      .result-title { font-size: 24px; }
      .result-desc  { font-size: 14px; }

      /* Narrower label so bar track has more room */
      .bar-lbl   { width: 72px; font-size: 12px; }
      .score-title { font-size: 12px; }
    }

    /* Very small phones (< 360px) */
    @media (max-width: 360px) {
      .q-text  { font-size: 15px; }
      .opt-btn { font-size: 13px; padding: 12px 10px; }
      .bar-lbl { width: 60px; }
    }

    /* ── Focus visible (accessibility) ── */
    :focus-visible { outline: 3px solid var(--primary); outline-offset: 2px; }

    /* ── QR Modal ── */
    .qr-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-tap-highlight-color: transparent;
    }
    .qr-modal.active { display: flex; }
    .qr-box {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 8px 48px rgba(0,0,0,0.22);
      padding: 30px 24px 22px;
      text-align: center;
      max-width: 300px;
      width: 100%;
      animation: fadeUp 0.22s ease;
    }
    .qr-modal-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
    .qr-img {
      display: block;
      margin: 0 auto 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      width: 190px;
      height: 190px;
      object-fit: contain;
    }
    .qr-warn-ico { font-size: 44px; margin-bottom: 10px; }
    .qr-url-box {
      font-size: 11px;
      color: var(--text-muted);
      word-break: break-all;
      margin-bottom: 10px;
      padding: 8px 10px;
      background: var(--bg);
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      text-align: left;
      max-height: 56px;
      overflow-y: auto;
    }
    .qr-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 18px;
      line-height: 1.55;
      word-break: keep-all;
    }
    .btn-share {
      background: none;
      border: 2px solid var(--border);
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
      width: 100%;
      padding: 11px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      min-height: 46px;
    }
    @media (hover: hover) and (pointer: fine) {
      .btn-share:hover { border-color: var(--primary); color: var(--primary); }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── INTRO ── -->
  <section id="intro-screen" class="screen active" role="main">
    <div class="card intro-card">
      <span class="intro-icon">⚙️</span>
      <h1 class="intro-title">공학 포지션 진단</h1>
      <p class="intro-sub">20개의 질문에 솔직하게 답하고<br>나의 공학 포지션을 알아보세요.</p>
      <div class="pos-grid" aria-hidden="true">
        <div class="pos-chip"><span class="ico">🛠️</span>메이커</div>
        <div class="pos-chip"><span class="ico">🎨</span>공학 아티스트</div>
        <div class="pos-chip"><span class="ico">🧭</span>공학 디렉터</div>
      </div>
      <button class="btn btn-primary btn-full" id="start-btn">진단 시작하기 →</button>
      <button class="btn-share" id="share-btn">📱 QR코드로 공유하기</button>
    </div>
  </section>

  <!-- ── QUIZ ── -->
  <section id="quiz-screen" class="screen" aria-label="진단 질문">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="prog-text" aria-live="polite">1 / 20</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="20"
           aria-valuenow="0" id="prog-bar-aria">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="card" id="q-card">
      <div class="q-label" id="q-num">질문 1</div>
      <h2 class="q-text" id="q-text"></h2>
      <div class="options" id="options" role="radiogroup" aria-label="보기"></div>
    </div>

    <div class="nav">
      <button class="btn btn-ghost" id="prev-btn" aria-label="이전 질문">← 이전</button>
      <button class="btn btn-primary" id="next-btn" disabled>다음 질문</button>
    </div>
  </section>

  <!-- ── RESULT ── -->
  <section id="result-screen" class="screen" aria-label="진단 결과">
    <div class="card result-card">
      <span class="result-badge">진단 결과</span>
      <span class="result-icon" id="r-icon" aria-hidden="true"></span>
      <h2 class="result-title" id="r-title"></h2>
      <p class="result-desc" id="r-desc"></p>
      <div class="score-bars" id="score-bars" aria-hidden="true">
        <p class="score-title">포지션 분포</p>
        <div class="bar-row">
          <div class="bar-lbl">메이커</div>
          <div class="bar-track"><div class="bar-fill maker" id="bar-maker"></div></div>
        </div>
        <div class="bar-row">
          <div class="bar-lbl">공학 아티스트</div>
          <div class="bar-track"><div class="bar-fill artist" id="bar-artist"></div></div>
        </div>
        <div class="bar-row">
          <div class="bar-lbl">공학 디렉터</div>
          <div class="bar-track"><div class="bar-fill director" id="bar-director"></div></div>
        </div>
      </div>
      <button class="btn btn-primary btn-full" id="retry-btn">다시 하기</button>
      <button class="btn-share" id="result-share-btn">📱 친구에게 공유하기</button>
    </div>
  </section>

  <!-- ── QR MODAL ── -->
  <div id="qr-modal" class="qr-modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="qr-box">
      <p class="qr-modal-title">📱 QR코드로 공유</p>
      <div id="qr-content"></div>
      <button class="btn btn-ghost" id="qr-close-btn" style="width:100%;margin-top:4px;">닫기</button>
    </div>
  </div>

</div>

<script>

//  CONFIG
// ─────────────────────────────────────────────
const TIE_THRESHOLD = 3;

//  DATA  (maker / artist / director 점수는 UI에 노출 안 함)

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let currentQ = 0;
let answers  = new Array(20).fill(null); // selected displayOrder slot per question

// ─────────────────────────────────────────────
//  DOM REFS
// ─────────────────────────────────────────────
const $intro  = document.getElementById('intro-screen');
const $quiz   = document.getElementById('quiz-screen');
const $result = document.getElementById('result-screen');

const $qNum     = document.getElementById('q-num');
const $qText    = document.getElementById('q-text');
const $options  = document.getElementById('options');
const $nextBtn  = document.getElementById('next-btn');
const $prevBtn  = document.getElementById('prev-btn');

const $progText = document.getElementById('prog-text');
const $progPct  = document.getElementById('prog-pct');
const $progFill = document.getElementById('prog-fill');
const $progAria = document.getElementById('prog-bar-aria');

const $rIcon  = document.getElementById('r-icon');
const $rTitle = document.getElementById('r-title');
const $rDesc  = document.getElementById('r-desc');

const $barMaker    = document.getElementById('bar-maker');
const $barArtist   = document.getElementById('bar-artist');
const $barDirector = document.getElementById('bar-director');

// ─────────────────────────────────────────────
//  SCREEN MANAGEMENT
// ─────────────────────────────────────────────
function showScreen(el) {
  [$intro, $quiz, $result].forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  window.scrollTo(0, 0);
}

// ─────────────────────────────────────────────
//  QUIZ
// ─────────────────────────────────────────────
function startQuiz() {
  currentQ = 0;
  answers.fill(null);
  showScreen($quiz);
  renderQuestion();
}

const LABELS = ['A', 'B', 'C', 'D'];

function renderQuestion() {
  window.scrollTo(0, 0);
  const q = questions[currentQ];
  const n = currentQ;

  // Progress
  const pct = Math.round((n / 20) * 100);
  $progText.textContent = `${n + 1} / 20`;
  $progPct.textContent  = `${pct}%`;
  $progFill.style.width = `${pct}%`;
  $progAria.setAttribute('aria-valuenow', n);

  // Question
  $qNum.textContent  = `질문 ${n + 1}`;
  $qText.textContent = q.question;

  // Options (rendered in displayOrder)
  $options.innerHTML = '';
  q.displayOrder.forEach((optIdx, displaySlot) => {
    const opt = q.options[optIdx];
    const btn = document.createElement('button');
    btn.className  = 'opt-btn' + (answers[n] === displaySlot ? ' selected' : '');
    btn.dataset.slot = displaySlot;
    btn.setAttribute('role', 'radio');
    btn.setAttribute('aria-checked', answers[n] === displaySlot ? 'true' : 'false');
    btn.innerHTML = `<span class="opt-circle" aria-hidden="true">${LABELS[displaySlot]}</span>
                     <span class="opt-text">${opt.text}</span>`;
    btn.addEventListener('click', () => selectOption(displaySlot));
    $options.appendChild(btn);
  });

  // Buttons state
  $nextBtn.disabled    = answers[n] === null;
  $nextBtn.textContent = n === 19 ? '결과 보기' : '다음 질문';
  $prevBtn.classList.toggle('invisible', n === 0);

  // Animate card
  const card = document.getElementById('q-card');
  card.classList.remove('animate');
  void card.offsetWidth;
  card.classList.add('animate');
}

function selectOption(slot) {
  answers[currentQ] = slot;
  document.querySelectorAll('.opt-btn').forEach(btn => {
    const s = parseInt(btn.dataset.slot);
    btn.classList.toggle('selected', s === slot);
    btn.setAttribute('aria-checked', s === slot ? 'true' : 'false');
  });
  $nextBtn.disabled = false;
}

function goNext() {
  if (answers[currentQ] === null) return;
  if (currentQ < 19) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function goPrev() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

// ─────────────────────────────────────────────
//  SCORING
// ─────────────────────────────────────────────
function calcScores() {
  let maker = 0, artist = 0, director = 0;
  questions.forEach((q, i) => {
    if (answers[i] !== null) {
      const opt = q.options[q.displayOrder[answers[i]]];
      maker    += opt.maker;
      artist   += opt.artist;
      director += opt.director;
    }
  });
  return { maker, artist, director };
}

// ─────────────────────────────────────────────
//  RESULT
// ─────────────────────────────────────────────
const POSITIONS = {
  maker: {
    title: '메이커',
    icon:  '🛠️',
    desc:  '직접 만들고 구현하는 실행 중심의 공학자입니다. 아이디어를 손으로 완성하고 동작시키는 데 가장 큰 성취를 느낍니다.'

  artist: {
    title: '공학 아티스트',
    icon:  '🎨',
    desc:  '공학적 내용을 \'표현\'하고 프로젝트의 \'의미\'를 사람들에게 전달하는 공학자입니다. 커뮤니케이터와 오퍼레이터의 복합형입니다.'
  },
  director: {
    title: '공학 디렉터',
    icon:  '🧭',
    desc:  '프로젝트의 방향을 설정하고 전체를 이끄는 공학자입니다. 목표·우선순위·역할을 조율하는 데 강점이 있습니다.'
  },
  hybrid: {
    title: '복합형 공학자',
    icon:  '🌟',
    desc:  '여러 포지션의 강점을 고루 갖춘 균형 잡힌 공학자입니다. 상황에 따라 메이커·공학 아티스트·공학 디렉터 역할을 유연하게 수행할 수 있습니다.'
  }
};

function showResult() {
  const { maker, artist, director } = calcScores();

  const sorted = [
    { key: 'maker',    score: maker    },
    { key: 'artist',   score: artist   },
    { key: 'director', score: director }
  ].sort((a, b) => b.score - a.score);

  const isTie = (sorted[0].score - sorted[1].score) <= TIE_THRESHOLD;
  const res   = isTie ? POSITIONS.hybrid : POSITIONS[sorted[0].key];

  $rIcon.textContent  = res.icon;
  $rTitle.textContent = res.title;
  $rDesc.textContent  = res.desc;

  // Score bars — widths set via JS, no raw score in DOM
  const maxScore = Math.max(maker, artist, director) || 1;
  $barMaker.style.width    = '0%';
  $barArtist.style.width   = '0%';
  $barDirector.style.width = '0%';

  showScreen($result);

  // Animate bars after paint
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      $barMaker.style.width    = (maker    / maxScore * 100).toFixed(1) + '%';
      $barArtist.style.width   = (artist   / maxScore * 100).toFixed(1) + '%';
      $barDirector.style.width = (director / maxScore * 100).toFixed(1) + '%';
    });
  });
}

document.getElementById('start-btn').addEventListener('click', startQuiz);
$nextBtn.addEventListener('click', goNext);
$prevBtn.addEventListener('click', goPrev);
document.getElementById('retry-btn').addEventListener('click', () => showScreen($intro));

// ─────────────────────────────────────────────
//  QR SHARE
// ─────────────────────────────────────────────
const $qrModal   = document.getElementById('qr-modal');
const $qrContent = document.getElementById('qr-content');

function openQR() {
  const url = window.location.href;
  let html = '';

  if (url.startsWith('file://')) {
    html = `
      <p class="qr-warn-ico">⚠️</p>
      <p class="qr-hint" style="color:#ef4444;margin-bottom:10px;">
        파일을 직접 열면 QR 공유가 불가합니다.<br>
        아래 방법으로 웹 서버를 실행해 주세요.
      </p>
      <div class="qr-url-box">터미널에서 실행:<br>python -m http.server 8080<br><br>접속 후 로컬 IP 주소로 다시 시도해 주세요.</div>
    `;
  } else if (/^https?:\/\/(localhost|127\.0\.0\.1)/.test(url)) {
    html = `
      <p class="qr-warn-ico">⚠️</p>
      <p class="qr-hint" style="color:#f59e0b;margin-bottom:10px;">
        localhost는 외부 기기에서 접속할 수 없습니다.<br>
        같은 WiFi 네트워크의 로컬 IP 주소로 접속 후 다시 시도하세요.
      </p>
      <div class="qr-url-box">예: http://192.168.x.x:8080</div>
    `;
  } else {
    const encoded = encodeURIComponent(url);
    html = `
      <img class="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?data=${encoded}&size=200x200&margin=6" alt="QR 코드">
      <div class="qr-url-box">${url}</div>
      <p class="qr-hint">카메라로 QR코드를 스캔하면 바로 접속됩니다.</p>
    `;
  }

  $qrContent.innerHTML = html;
  $qrModal.classList.add('active');
  $qrModal.setAttribute('aria-hidden', 'false');
}

function closeQR() {
  $qrModal.classList.remove('active');
  $qrModal.setAttribute('aria-hidden', 'true');
}

document.getElementById('share-btn').addEventListener('click', openQR);
document.getElementById('result-share-btn').addEventListener('click', openQR);
document.getElementById('qr-close-btn').addEventListener('click', closeQR);
$qrModal.addEventListener('click', e => { if (e.target === $qrModal) closeQR(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && $qrModal.classList.contains('active')) closeQR();
});

// Keyboard navigation (quiz screen only)
document.addEventListener('keydown', e => {
  if (!$quiz.classList.contains('active')) return;
  if (e.key >= '1' && e.key <= '4') {
    selectOption(parseInt(e.key) - 1);
  } else if (e.key === 'Enter') {
    goNext();
  } else if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
    goPrev();
  }
});
</script>
